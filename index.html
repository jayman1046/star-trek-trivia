<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Trek Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;600;700&family=Michroma&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lcars-orange: #FF9900;
    --lcars-blue: #9999FF;
    --lcars-purple: #CC99CC;
    --lcars-red: #CC6666;
    --lcars-gold: #FFCC66;
    --lcars-teal: #66CCCC;
    --lcars-lavender: #9999CC;
    --lcars-peach: #FF9966;
    --lcars-bg: #000000;
    --lcars-panel: #1a1a2e;
    --lcars-text: #FF9900;
    --lcars-text-light: #FFCC99;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--lcars-bg);
    color: var(--lcars-text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LCARS Frame */
  .lcars-frame {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 10px;
  }

  .lcars-header {
    display: flex;
    align-items: stretch;
    margin-bottom: 10px;
  }

  .lcars-elbow-top {
    width: 120px;
    min-height: 80px;
    background: var(--lcars-orange);
    border-radius: 0 0 0 40px;
    flex-shrink: 0;
    position: relative;
  }

  .lcars-elbow-top::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 60px;
    height: 100%;
    background: var(--lcars-bg);
    border-radius: 0 0 0 40px;
  }

  .lcars-header-bar {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 15px;
  }

  .lcars-header-pill {
    height: 30px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    font-family: 'Antonio', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #000;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .lcars-title-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lcars-title {
    font-family: 'Michroma', sans-serif;
    font-size: 28px;
    color: var(--lcars-gold);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255, 204, 102, 0.4);
  }

  .lcars-header-end {
    width: 200px;
    height: 30px;
    background: var(--lcars-blue);
    border-radius: 15px;
    align-self: center;
  }

  /* Sidebar */
  .lcars-body {
    display: flex;
    flex: 1;
    gap: 10px;
  }

  .lcars-sidebar {
    width: 120px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .lcars-sidebar-block {
    border-radius: 0 20px 20px 0;
    padding: 10px 8px;
    font-family: 'Antonio', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #000;
    text-align: right;
    letter-spacing: 1px;
    cursor: default;
  }

  .lcars-sidebar-spacer {
    flex: 1;
    background: var(--lcars-orange);
    border-radius: 0;
    min-height: 20px;
  }

  .lcars-sidebar-bottom {
    height: 60px;
    background: var(--lcars-orange);
    border-radius: 0 40px 0 0;
    position: relative;
  }

  .lcars-sidebar-bottom::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 60px;
    height: 100%;
    background: var(--lcars-bg);
    border-radius: 0 40px 0 0;
  }

  /* Main Content */
  .lcars-content {
    flex: 1;
    padding: 10px;
  }

  /* Score Display */
  .score-display {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding: 8px 20px;
    background: var(--lcars-panel);
    border: 1px solid var(--lcars-orange);
    border-radius: 20px;
  }

  .score-label {
    font-family: 'Antonio', sans-serif;
    font-size: 18px;
    color: var(--lcars-blue);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .score-value {
    font-family: 'Antonio', sans-serif;
    font-size: 32px;
    color: var(--lcars-gold);
    letter-spacing: 2px;
  }

  .round-info {
    font-family: 'Antonio', sans-serif;
    font-size: 16px;
    color: var(--lcars-teal);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Game Board */
  .game-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }

  .category-header {
    background: var(--lcars-purple);
    color: #000;
    font-family: 'Antonio', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    padding: 12px 6px;
    border-radius: 10px 10px 4px 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
  }

  .clue-cell {
    background: var(--lcars-blue);
    color: #000;
    font-family: 'Antonio', sans-serif;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    padding: 15px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 55px;
    letter-spacing: 1px;
  }

  .clue-cell:hover {
    background: var(--lcars-gold);
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(255, 204, 102, 0.5);
  }

  .clue-cell.used {
    background: #2a2a3e;
    color: #444;
    cursor: default;
    pointer-events: none;
  }

  .clue-cell.used:hover {
    transform: none;
    box-shadow: none;
  }

  /* Clue Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }

  .modal-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-content {
    background: var(--lcars-panel);
    border: 2px solid var(--lcars-orange);
    border-radius: 30px;
    padding: 40px;
    max-width: 750px;
    width: 90%;
    position: relative;
    animation: slideUp 0.4s ease;
  }

  .modal-category {
    font-family: 'Antonio', sans-serif;
    font-size: 16px;
    color: var(--lcars-purple);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .modal-value {
    font-family: 'Antonio', sans-serif;
    font-size: 22px;
    color: var(--lcars-gold);
    letter-spacing: 2px;
    margin-bottom: 25px;
  }

  .modal-clue {
    font-family: 'Exo 2', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--lcars-text-light);
    line-height: 1.6;
    margin-bottom: 35px;
    text-align: center;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .modal-btn {
    font-family: 'Antonio', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 30px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #000;
  }

  .btn-reveal {
    background: var(--lcars-teal);
  }

  .btn-reveal:hover {
    background: #88dddd;
    box-shadow: 0 0 15px rgba(102, 204, 204, 0.5);
  }

  .btn-correct {
    background: var(--lcars-gold);
    display: none;
  }

  .btn-correct:hover {
    background: #ffdd88;
    box-shadow: 0 0 15px rgba(255, 204, 102, 0.5);
  }

  .btn-incorrect {
    background: var(--lcars-red);
    display: none;
  }

  .btn-incorrect:hover {
    background: #dd8888;
    box-shadow: 0 0 15px rgba(204, 102, 102, 0.5);
  }

  .btn-close {
    background: var(--lcars-lavender);
    display: none;
  }

  .btn-close:hover {
    background: #aaaadd;
    box-shadow: 0 0 15px rgba(153, 153, 204, 0.5);
  }

  .modal-answer {
    display: none;
    font-family: 'Michroma', sans-serif;
    font-size: 20px;
    color: var(--lcars-gold);
    text-align: center;
    margin-bottom: 25px;
    padding: 15px;
    border: 1px solid var(--lcars-gold);
    border-radius: 15px;
    background: rgba(255, 204, 102, 0.05);
    text-shadow: 0 0 10px rgba(255, 204, 102, 0.3);
  }

  /* Category Selection Screen */
  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .category-select-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    max-width: 700px;
    margin: 30px auto;
  }

  .category-select-card {
    background: var(--lcars-panel);
    border: 2px solid var(--lcars-blue);
    border-radius: 15px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }

  .category-select-card:hover {
    border-color: var(--lcars-gold);
    background: rgba(255, 204, 102, 0.05);
    transform: scale(1.02);
  }

  .category-select-card.selected {
    border-color: var(--lcars-gold);
    background: rgba(255, 204, 102, 0.1);
    box-shadow: 0 0 15px rgba(255, 204, 102, 0.2);
  }

  .category-select-name {
    font-family: 'Antonio', sans-serif;
    font-size: 22px;
    color: var(--lcars-gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .category-select-count {
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    color: var(--lcars-lavender);
  }

  .start-btn {
    display: block;
    margin: 30px auto;
    font-family: 'Antonio', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 15px 50px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: var(--lcars-orange);
    color: #000;
    transition: all 0.2s ease;
  }

  .start-btn:hover {
    background: var(--lcars-gold);
    box-shadow: 0 0 25px rgba(255, 153, 0, 0.5);
  }

  .start-btn:disabled {
    background: #444;
    cursor: not-allowed;
    box-shadow: none;
  }

  .setup-title {
    font-family: 'Michroma', sans-serif;
    font-size: 22px;
    color: var(--lcars-gold);
    text-align: center;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .setup-subtitle {
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    color: var(--lcars-lavender);
    text-align: center;
    margin-bottom: 10px;
  }

  /* Footer */
  .lcars-footer {
    display: flex;
    align-items: stretch;
    margin-top: 10px;
    height: 30px;
  }

  .lcars-footer-elbow {
    width: 120px;
    background: var(--lcars-orange);
    border-radius: 0 0 0 0;
    flex-shrink: 0;
  }

  .lcars-footer-bar {
    flex: 1;
    display: flex;
    gap: 8px;
    padding: 0 15px;
    align-items: center;
  }

  .lcars-footer-pill {
    height: 20px;
    border-radius: 10px;
    flex: 1;
  }

  /* Starfield background */
  .starfield {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: var(--max-opacity); }
  }

  /* Game Over Screen */
  .game-over {
    text-align: center;
    padding: 40px 20px;
  }

  .game-over-title {
    font-family: 'Michroma', sans-serif;
    font-size: 36px;
    color: var(--lcars-gold);
    letter-spacing: 6px;
    margin-bottom: 20px;
    text-shadow: 0 0 30px rgba(255, 204, 102, 0.5);
  }

  .final-score {
    font-family: 'Antonio', sans-serif;
    font-size: 64px;
    color: var(--lcars-orange);
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  .final-stats {
    font-family: 'Exo 2', sans-serif;
    font-size: 16px;
    color: var(--lcars-lavender);
    margin-bottom: 30px;
    line-height: 1.8;
  }

  .play-again-btn {
    font-family: 'Antonio', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 15px 40px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: var(--lcars-orange);
    color: #000;
    transition: all 0.2s ease;
  }

  .play-again-btn:hover {
    background: var(--lcars-gold);
    box-shadow: 0 0 25px rgba(255, 153, 0, 0.5);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .lcars-sidebar { display: none; }
    .lcars-elbow-top { width: 60px; }
    .lcars-footer-elbow { width: 60px; }
    .lcars-title { font-size: 18px; letter-spacing: 3px; }
    .game-board { grid-template-columns: repeat(2, 1fr); }
    .category-header { font-size: 12px; padding: 8px 4px; min-height: 45px; }
    .clue-cell { font-size: 20px; padding: 10px 4px; min-height: 40px; }
    .modal-clue { font-size: 18px; }
    .modal-content { padding: 25px; }
    .category-select-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="starfield" id="starfield"></div>

<div class="lcars-frame">
  <div class="lcars-header">
    <div class="lcars-elbow-top"></div>
    <div class="lcars-header-bar">
      <div class="lcars-header-pill" style="background: var(--lcars-red); width: 80px;">47988</div>
      <div class="lcars-header-pill" style="background: var(--lcars-teal); width: 60px;">NCC</div>
      <div class="lcars-title-area">
        <h1 class="lcars-title">Star Trek Trivia</h1>
      </div>
      <div class="lcars-header-end"></div>
    </div>
  </div>

  <div class="lcars-body">
    <div class="lcars-sidebar">
      <div class="lcars-sidebar-block" style="background: var(--lcars-orange);">5748</div>
      <div class="lcars-sidebar-block" style="background: var(--lcars-blue);">1701</div>
      <div class="lcars-sidebar-block" style="background: var(--lcars-purple);">4523</div>
      <div class="lcars-sidebar-block" style="background: var(--lcars-teal);">7492</div>
      <div class="lcars-sidebar-block" style="background: var(--lcars-gold);">2371</div>
      <div class="lcars-sidebar-block" style="background: var(--lcars-peach);">9834</div>
      <div class="lcars-sidebar-spacer"></div>
      <div class="lcars-sidebar-bottom"></div>
    </div>

    <div class="lcars-content">
      <!-- Setup Screen -->
      <div class="screen active" id="setupScreen">
        <div class="setup-title">Select Categories</div>
        <div class="setup-subtitle">Choose 4 categories for your game board</div>
        <div class="category-select-grid" id="categorySelectGrid"></div>
        <button class="start-btn" id="startBtn" disabled>Engage</button>
      </div>

      <!-- Game Screen -->
      <div class="screen" id="gameScreen">
        <div class="score-display">
          <div class="round-info" id="roundInfo">Round 1</div>
          <div>
            <span class="score-label">Score: </span>
            <span class="score-value" id="scoreDisplay">0</span>
          </div>
          <div>
            <span class="score-label">Clues: </span>
            <span class="score-value" id="cluesRemaining">40</span>
          </div>
        </div>
        <div class="game-board" id="gameBoard"></div>
      </div>

      <!-- Game Over Screen -->
      <div class="screen" id="gameOverScreen">
        <div class="game-over">
          <div class="game-over-title">Mission Complete</div>
          <div class="final-score" id="finalScore">0</div>
          <div class="final-stats" id="finalStats"></div>
          <button class="play-again-btn" onclick="resetGame()">Play Again</button>
        </div>
      </div>
    </div>
  </div>

  <div class="lcars-footer">
    <div class="lcars-footer-elbow"></div>
    <div class="lcars-footer-bar">
      <div class="lcars-footer-pill" style="background: var(--lcars-blue);"></div>
      <div class="lcars-footer-pill" style="background: var(--lcars-purple); flex: 0.5;"></div>
      <div class="lcars-footer-pill" style="background: var(--lcars-teal); flex: 2;"></div>
      <div class="lcars-footer-pill" style="background: var(--lcars-gold); flex: 0.3;"></div>
      <div class="lcars-footer-pill" style="background: var(--lcars-orange); flex: 1.5;"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <div class="modal-category" id="modalCategory"></div>
    <div class="modal-value" id="modalValue"></div>
    <div class="modal-clue" id="modalClue"></div>
    <div class="modal-answer" id="modalAnswer"></div>
    <div class="modal-actions">
      <button class="modal-btn btn-reveal" id="btnReveal" onclick="revealAnswer()">Reveal Answer</button>
      <button class="modal-btn btn-correct" id="btnCorrect" onclick="markCorrect()">Correct</button>
      <button class="modal-btn btn-incorrect" id="btnIncorrect" onclick="markIncorrect()">Incorrect</button>
      <button class="modal-btn btn-close" id="btnClose" onclick="closeModal()">Continue</button>
    </div>
  </div>
</div>

<script>

// ============================================
// GAME STATE
// ============================================
let gameState = {
  score: 0,
  correct: 0,
  incorrect: 0,
  selectedCategories: [],
  boardClues: [],
  currentClue: null,
  currentValue: 0,
  cluesRemaining: 0
};

// ============================================
// STARFIELD
// ============================================
function createStarfield() {
  const field = document.getElementById('starfield');
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
    star.style.setProperty('--max-opacity', Math.random() * 0.6 + 0.2);
    star.style.animationDelay = Math.random() * 4 + 's';
    field.appendChild(star);
  }
}

// ============================================
// CATEGORY SELECTION
// ============================================
function initCategorySelection() {
  const grid = document.getElementById('categorySelectGrid');
  grid.innerHTML = '';
  const categoryNames = Object.keys(allCategories);

  categoryNames.forEach(name => {
    const totalClues = Object.values(allCategories[name]).reduce((sum, arr) => sum + arr.length, 0);
    const card = document.createElement('div');
    card.className = 'category-select-card';
    card.innerHTML = `
      <div class="category-select-name">${name}</div>
      <div class="category-select-count">${totalClues} clues available</div>
    `;
    card.addEventListener('click', () => toggleCategory(card, name));
    grid.appendChild(card);
  });
}

function toggleCategory(card, name) {
  const idx = gameState.selectedCategories.indexOf(name);
  if (idx > -1) {
    gameState.selectedCategories.splice(idx, 1);
    card.classList.remove('selected');
  } else {
    if (gameState.selectedCategories.length >= 4) return;
    gameState.selectedCategories.push(name);
    card.classList.add('selected');
  }
  document.getElementById('startBtn').disabled = gameState.selectedCategories.length !== 4;
}

// ============================================
// BUILD GAME BOARD
// ============================================
function buildBoard() {
  gameState.boardClues = [];

  gameState.selectedCategories.forEach(catName => {
    const category = allCategories[catName];
    const allClues = [...category.tng, ...category.ds9, ...category.voy];

    // Sort by difficulty
    const easy = allClues.filter(c => c.difficulty === 1);
    const medium = allClues.filter(c => c.difficulty === 2);
    const hard = allClues.filter(c => c.difficulty === 3);

    // Shuffle each difficulty
    shuffle(easy);
    shuffle(medium);
    shuffle(hard);

    // Pick clues: 3 easy, 4 medium, 3 hard = 10
    const selected = [
      ...easy.slice(0, 3),
      ...medium.slice(0, 4),
      ...hard.slice(0, 3)
    ];

    // If we don't have enough in a tier, fill from others
    while (selected.length < 10 && (easy.length > 3 || medium.length > 4 || hard.length > 3)) {
      const remaining = allClues.filter(c => !selected.includes(c));
      if (remaining.length > 0) {
        selected.push(remaining[0]);
      } else break;
    }

    // Sort by difficulty for point values
    selected.sort((a, b) => a.difficulty - b.difficulty);

    gameState.boardClues.push({
      name: catName,
      clues: selected.map((clue, i) => ({
        ...clue,
        value: (i + 1) * 100,
        used: false
      }))
    });
  });

  gameState.cluesRemaining = gameState.boardClues.reduce((sum, cat) => sum + cat.clues.length, 0);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderBoard() {
  const board = document.getElementById('gameBoard');
  board.innerHTML = '';

  // Category headers
  gameState.boardClues.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'category-header';
    header.textContent = cat.name;
    board.appendChild(header);
  });

  // Clue cells (row by row)
  const maxClues = Math.max(...gameState.boardClues.map(c => c.clues.length));
  for (let row = 0; row < maxClues; row++) {
    gameState.boardClues.forEach((cat, catIdx) => {
      const cell = document.createElement('div');
      if (row < cat.clues.length) {
        const clue = cat.clues[row];
        cell.className = 'clue-cell' + (clue.used ? ' used' : '');
        cell.textContent = clue.used ? '' : clue.value;
        cell.addEventListener('click', () => openClue(catIdx, row));
      } else {
        cell.className = 'clue-cell used';
      }
      board.appendChild(cell);
    });
  }

  document.getElementById('scoreDisplay').textContent = gameState.score;
  document.getElementById('cluesRemaining').textContent = gameState.cluesRemaining;
}

// ============================================
// CLUE MODAL
// ============================================
function openClue(catIdx, clueIdx) {
  const cat = gameState.boardClues[catIdx];
  const clue = cat.clues[clueIdx];
  if (clue.used) return;

  gameState.currentClue = { catIdx, clueIdx };
  gameState.currentValue = clue.value;

  document.getElementById('modalCategory').textContent = cat.name;
  document.getElementById('modalValue').textContent = clue.value + ' points';
  document.getElementById('modalClue').textContent = clue.clue;
  document.getElementById('modalAnswer').textContent = clue.answer;
  document.getElementById('modalAnswer').style.display = 'none';

  document.getElementById('btnReveal').style.display = 'inline-block';
  document.getElementById('btnCorrect').style.display = 'none';
  document.getElementById('btnIncorrect').style.display = 'none';
  document.getElementById('btnClose').style.display = 'none';

  document.getElementById('modal').classList.add('active');
}

function revealAnswer() {
  document.getElementById('modalAnswer').style.display = 'block';
  document.getElementById('btnReveal').style.display = 'none';
  document.getElementById('btnCorrect').style.display = 'inline-block';
  document.getElementById('btnIncorrect').style.display = 'inline-block';
}

function markCorrect() {
  const { catIdx, clueIdx } = gameState.currentClue;
  gameState.score += gameState.currentValue;
  gameState.correct++;
  gameState.boardClues[catIdx].clues[clueIdx].used = true;
  gameState.cluesRemaining--;

  document.getElementById('btnCorrect').style.display = 'none';
  document.getElementById('btnIncorrect').style.display = 'none';
  document.getElementById('btnClose').style.display = 'inline-block';
}

function markIncorrect() {
  const { catIdx, clueIdx } = gameState.currentClue;
  gameState.score -= gameState.currentValue;
  gameState.incorrect++;
  gameState.boardClues[catIdx].clues[clueIdx].used = true;
  gameState.cluesRemaining--;

  document.getElementById('btnCorrect').style.display = 'none';
  document.getElementById('btnIncorrect').style.display = 'none';
  document.getElementById('btnClose').style.display = 'inline-block';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  renderBoard();

  if (gameState.cluesRemaining <= 0) {
    showGameOver();
  }
}

// ============================================
// GAME OVER
// ============================================
function showGameOver() {
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('gameOverScreen').classList.add('active');

  const total = gameState.correct + gameState.incorrect;
  const pct = total > 0 ? Math.round((gameState.correct / total) * 100) : 0;

  document.getElementById('finalScore').textContent = gameState.score;
  document.getElementById('finalStats').innerHTML = `
    Correct: ${gameState.correct} / ${total}<br>
    Accuracy: ${pct}%<br>
    Categories: ${gameState.selectedCategories.join(' • ')}
  `;
}

// ============================================
// RESET
// ============================================
function resetGame() {
  gameState = {
    score: 0,
    correct: 0,
    incorrect: 0,
    selectedCategories: [],
    boardClues: [],
    currentClue: null,
    currentValue: 0,
    cluesRemaining: 0
  };

  document.getElementById('gameOverScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('setupScreen').classList.add('active');

  initCategorySelection();
}

// ============================================
// START GAME
// ============================================
document.getElementById('startBtn').addEventListener('click', () => {
  buildBoard();

  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');

  renderBoard();
});

// ============================================
// INIT
// ============================================
createStarfield();
initCategorySelection();
</script>
</body>
</html>
